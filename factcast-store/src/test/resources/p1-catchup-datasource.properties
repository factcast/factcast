factcast.store.p1-catchup-datasource.driver-class-name=${spring.datasource.driver-class-name}
factcast.store.p1-catchup-datasource.url=${spring.datasource.url}
factcast.store.p1-catchup-datasource.username=${spring.datasource.username:}
factcast.store.p1-catchup-datasource.password=${spring.datasource.password:}
factcast.store.p1-catchup-datasource.type=org.apache.tomcat.jdbc.pool.DataSource
factcast.store.p1-catchup-datasource.connection-properties=socketTimeout=0;preparedStatementCacheSize=0;
factcast.store.p1-catchup-datasource.default-read-only=true
