spring.main.web-application-type=none
spring.main.banner-mode=off
logging.level.root=INFO
logging.level.org.factcast.example.smilepoc=INFO

poc.csv.path=${POC_CSV:/tmp/transformationcache.csv}

poc.postgres.url=jdbc:postgresql://localhost:5432/factcast_poc
poc.postgres.user=postgres
poc.postgres.password=postgres

poc.reset=true
poc.skip-load=false

poc.bench.warmup=2000
poc.bench.single-iterations=20000
poc.bench.bulk-100-iterations=200
poc.bench.bulk-1000-iterations=50
poc.bench.parse-iterations=20000
poc.bench.filter-iterations=50000
poc.bench.invalidation-runs=3
poc.bench.insert-batch-size=2000
poc.bench.report-csv=target/poc-results.csv
